name: Publish

on:
    workflow_call:
        inputs:
            enable-rust:
                description: 'Enable Rust job.'
                type: boolean
                required: true
            enable-typescript:
                description: 'Enable TypeScript job.'
                type: boolean
                required: true
            typescript-registry-github:
                description: 'Publish TypeScript packages to GitHub Packages registry.'
                type: boolean
                required: false
                default: false
            typescript-registry-npm:
                description: 'Publish TypeScript packages to npm registry.'
                type: boolean
                required: false
                default: false

            # Inputs for `actions-rust-lang/setup-rust-toolchain`.
            # https://github.com/actions-rust-lang/setup-rust-toolchain/blob/main/action.yml
            toolchain:
                description: 'Comma-separated list of Rust toolchain specifications. Last version becomes the default. -- see https://rust-lang.github.io/rustup/concepts/toolchains.html#toolchain-specification'
                type: string
                required: false
            target:
                description: 'Target triple to install for this toolchain'
                type: string
                required: false

permissions:
    contents: read
    id-token: write

jobs:
    rust:
        name: Rust
        runs-on: ubuntu-latest
        if: ${{ inputs.enable-rust }}

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
              with:
                  toolchain: ${{ inputs.toolchain }}
                  target: ${{ inputs.target }}

            - name: Install Cargo Binary Install
              uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1

            - name: Install crates
              run: cargo binstall --force -y cargo-workspaces

            - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
              id: auth

            - name: Publish
              run: cargo workspaces publish --publish-as-is
              env:
                  CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    typescript:
        name: TypeScript
        runs-on: ubuntu-latest
        if: ${{ inputs.enable-typescript }}

        permissions:
            contents: read
            id-token: write
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'
                  cache: 'npm'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Publish to npm
              if: ${{ inputs.typescript-registry-npm }}
              run: npm publish --access public --registry https://registry.npmjs.org --workspaces

            - name: Set up Node.js
              if: ${{ inputs.typescript-registry-github }}
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 'lts/*'
                  cache: 'npm'
                  registry-url: 'https://npm.pkg.github.com'

            - name: Publish to GitHub Packages
              if: ${{ inputs.typescript-registry-github }}
              run: npm publish --access public --registry https://npm.pkg.github.com --workspaces
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
